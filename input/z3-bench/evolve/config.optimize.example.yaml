# ============================================================================
# EXAMPLE — OPTIMIZE mode (z3.Optimize, full soft-constraint optimization).
# To use:  cp config.optimize.example.yaml config.yaml
# Pairs solver_mode: optimize + score_mode: cost (objective guard active).
# Artifacts: cache/, final_program.py. After copying:
#   python -m _lib.sampler z3-bench && python -m _lib.rebaseline z3-bench \
#     && ./run_phase.sh z3-bench --pin 2-7 \
#     && python -m _lib.final_verify z3-bench input/z3-bench/evolve/final_program.py
# ============================================================================
#
# Single config for z3-bench. Read by openevolve (dacite, ignores unknown
# top-level keys like `bench` / `parallel_solvers`) AND by input/run_phase.sh
# (via _lib/load_bench_config.py) for shell-side phase orchestration.
#
# === bench: section ===
# Consumed by input/run_phase.sh. phases[].iters omitted → uses
# max_iterations below (same for all phases).
bench:
  phases:
    - dir: phase1_opt_sls
    - dir: phase2_sat
    - dir: phase3_smt
    - dir: phase4_unified

  solver_check_cmd: "command -v z3"
  solver_install_hint: "install: apt-get install -y z3  or  pip install z3-solver"

  # === Refactor (2026-06) — paths to per-bench solver-specific files. ===
  adapter: adapter.py
  params_catalog: params.json
  worker_path: _solve_worker.py
  unified_dict_name: UNIFIED_OVERRIDES

  # === Solver mode (config-driven; no env var). ===
  # optimize: z3.Optimize, full soft-constraint optimization (pair with
  #           evaluation.score_mode: cost — objective guard).
  # sat:      z3.Solver over parse_smt2_file (drops assert-soft) — hard-only
  #           feasibility, faster, no objective (pair with score_mode: speedup).
  # The value also suffixes on-disk artifacts so both modes coexist:
  #   optimize → cache/,      final_program.py
  #   sat      → cache-sat/,  final_program_sat.py
  solver_mode: optimize

  # === Clustering / stage sampling. ===
  clustering:
    # `mode` selects a clustering.modes.<mode> override (shallow-merged over the
    # base block below). ORTHOGONAL to solver_mode — set `mode: large` to focus
    # on constraint-heavy instances in EITHER optimize or sat. Unset → base.
    # mode: large
    method: kmeans
    # reboot baselines are "Skipped" (elapsed_ms=0 placeholder), so cluster on
    # problem size — num_hard_constraints spans 2.5k–41k with good spread.
    feature: features.num_hard_constraints
    n_clusters: 5
    max_baseline_ms: 300000        # 5 min cap (placeholder elapsed_ms << this)
    spread: quintile
    stage_sizes:
      stage1: 5
      stage2: 5
      stage3: 5
      stage4: 20
    stage_clusters:
      stage1: [0, 1]
      stage2: [2, 3]
      stage3: [4]
      stage4: [0, 1, 2, 3, 4]

    # Clustering-mode overrides (shallow-merged over the block above when
    # `clustering.mode` selects one). `large` targets constraint-heavy
    # instances: threshold bucketing on num_hard_constraints, high bucket only.
    modes:
      large:
        method: thresholds
        thresholds: [15000]            # bucket 0 = <15k (dropped), bucket 1 = >=15k (38 of 89)
        stage_sizes:
          stage1: 6
          stage2: 10
          stage3: 12
          stage4: 38                   # "임계값 이상 전부"
        stage_clusters:
          stage1: [1]
          stage2: [1]
          stage3: [1]
          stage4: [1]
        spread: quintile

  # === Evaluation behavior. ===
  evaluation:
    repeats: 5
    timeout_factor: 1.3
    min_timeout_s: 5
    score_mode: cost               # z3-optimize: cost mode (objective guard via cost_ratio)
    time_metric: wall              # speedup signal = wall-clock ratio (baseline_ms/variant_ms),
                                   # NOT deterministic_time. rlimit was too noisy/unreflective on
                                   # this reboot workload. wall noise is tamed by repeats-averaging
                                   # (see evaluation.repeats); bump repeats if scores get jittery.
    enable_size_buckets: false
    enable_outlier_stage: false

# === Custom z3-bench knobs (silently ignored by openevolve dacite parser) ===
# parallel_solvers: total concurrent z3 worker subprocesses per stage.
#   - Read by shared/evaluator.py, rebaseline_local.py, baseline_params self-test.
#   - Each pinned to a dedicated core via taskset (Linux).
#   - Capped at len(problems_in_stage) at runtime.
#   - Env OPENEVOLVE_PARALLEL_SOLVERS overrides this value.
#   - Total RAM ≈ N × 4 GB worst-case — size per host.
parallel_solvers: 1

max_iterations: 50
checkpoint_interval: 10
log_level: "INFO"
random_seed: 42

diff_based_evolution: true
max_code_length: 20000        # phase2 (~95 keys) needs headroom

early_stopping_patience: null
convergence_threshold: 0.001
early_stopping_metric: "combined_score"

llm:
  models:
    - name: "claude-sonnet-4-6"
      provider: "claude_code"
      weight: 0.8
      timeout: 300              # raised from 180: a capped query needs ~180-250s; no retry on timeout now (see claude_code.py)
      retries: 2
      retry_delay: 10
      reasoning_effort: "high"
      max_thinking_tokens: 4000  # cap extended thinking; uncapped it overflowed the timeout and burned a 2nd retry for nothing
    - name: "claude-haiku-4-5"
      provider: "claude_code"
      weight: 0.2
      timeout: 300
      max_thinking_tokens: 4000

prompt:
  system_message: |
    You tune Z3 parameters for a z3.Optimize (soft-constraint) workload — 89 "reboot"
    SMT2 instances with ~1k Int / 3k Bool / 0.2k Real vars, 42–392 assert-soft + 2.5k–41k
    hard constraints, opt.* engaged. Every instance's optimal objective is 0 (all soft
    constraints satisfiable), reached in well under 5s by the baseline.

    Scoring is COST mode with a WALL-CLOCK time signal: the optimization target is MINIMIZING
    actual solve wall-time (baseline_ms / variant_ms speedup), which is the headroom that
    matters on real hardware. The objective value is a CORRECTNESS GUARD: your variant
    MUST still reach objective 0 on every instance (a worse/non-zero objective, or a
    non-Sat result, is heavily penalized). Note that wall-time on this workload is short
    and somewhat noisy, so favor changes with a clear, repeatable speedup over marginal ones.

    The initial_program.py exposes an EVOLVE-BLOCK dict (per phase: opt.*+sls.*, sat.*, smt.*,
    or unified). Mutate this dict to cut solve wall-time while PRESERVING
    correctness (result stays Sat, objective stays 0).

    Hard rules:
      - Do NOT modify sat.random_seed, smt.random_seed, sls.random_seed, parallel.enable
        (locked; evaluator returns 0 on violation).
      - Use only valid Z3 4.13.x parameter keys. Unknown keys cause evaluator to return 0
        and surface the offending key in artifacts.
      - Respect types: bool=true/false, ints, floats, symbols (bare strings like "vsids").

    Knob domains (non-exhaustive):
      sat.branching.heuristic in {vsids, lrb, chb}
      sat.restart in {luby, geometric, ema, static}
      sat.phase in {always_false, always_true, basic_caching, random, caching}
      sat.gc in {glue, psm, glue_psm, dyn_psm}
      sat.pb.solver in {circuit, sorting, totalizer, solver, segmented, binary_merge}
      sat.cardinality.encoding in {grouped, bimander, ordered, unate, circuit}
      smt.phase_selection 0..5
      smt.case_split 0..6
      smt.restart_strategy in {0=geometric, 1=inner_outer, 2=luby, 3=fixed, 4=arithmetic}
      smt.arith.solver in {2=simplex, 5=infinitary_lra, 6=lra}
      opt.maxsat_engine in {maxres, pd-maxres, wmax, sortmax, rc2, maxres-bin}
      opt.optsmt_engine in {basic, farkas, symba}
      opt.priority in {lex, pareto, box}
      sls.walksat_ucb_constant: float, sls.wp: percent 0..100

    Read the per_problem artifacts each round — they show speedup/regression per instance.
    Look for patterns: which knob change helped the slow Unsat cases vs the fast Sat cases?

database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7
  similarity_threshold: 0.95

evaluator:
  timeout: 600                  # 10 min cap per variant (stage3 worst-case ≈ 4 min wall)
  cascade_evaluation: true      # stage1 → stage2 → stage3 (→ stage4 inside) per variant
  cascade_thresholds: [1.03, 1.03, 1.03]
  # threshold[0] = stage1 combined_score gate to enter stage2 (>=1.03 = ≥3% gain)
  # threshold[1] = merged combined_score gate to enter stage3 (>=1.03 = ≥3% gain)
  # threshold[2] = stage3 combined_score gate to enter stage4 (>=1.03 = ≥3% gain)
  # threshold[2] is read by evaluator.evaluate_stage3 via runtime.cascade_threshold()
  # because openevolve cascade only exposes 3 stage slots — stage4 is chained
  # inside evaluate_stage3.
  # combined_score = geomean_speedup * solved_rate^2 (+ efficiency^STATS_WEIGHT).
  # Initial baseline-equivalent variant scores ≈1.0 — fails stage1 gate (good — skips downstream).
  parallel_evaluations: 1    # FIXED 1 — variant pool kept serial. All z3 concurrency
                             # is controlled by env OPENEVOLVE_PARALLEL_SOLVERS (inner
                             # ThreadPool that runs N stage-problems concurrently per
                             # variant). Single knob avoids RAM blow-up from
                             # parallel_evaluations × OPENEVOLVE_PARALLEL_SOLVERS.
