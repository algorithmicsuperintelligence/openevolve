max_iterations: 10
checkpoint_interval: 5
log_level: "INFO"
max_tasks_per_child: 1

llm:
  primary_model: "gpt-5.5"
  primary_model_weight: 1.0
  api_base: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.5
  max_tokens: 24000
  timeout: 300

prompt:
  system_message: |
    You are an expert Triton GPU programmer optimizing an EvoformerAttention autograd pair.

    Task:
    Improve the code inside the EVOLVE-BLOCK. The public API is a forward/backward pair
    with a flexible saved-tensor contract:

        def evoattention_forward_with_saved(q, k, v, res_mask, pair_bias):
            return y, saved_tensors

        def evoattention_backward_from_saved(do, saved_tensors):
            return dq, dk, dv, d_pair_bias

    Tensor layout:
        q, k, v:   [B, N_seq, N_res, Head, Dim]   float16 or bfloat16
        res_mask:  [B, N_seq, 1, 1, N_res]        float32, additive (0 keep, large-negative drop)
        pair_bias: [B, 1, Head, N_res, N_res]     float32, trainable, broadcast over N_seq
        output:    [B, N_seq, N_res, Head, Dim]

    Attention contracts over the N_res (residue) axis. Internally transpose
    q/k/v to [B, N_seq, Head, N_res, Dim] before the matmuls:

        scale = Dim ** -0.5
        S = scale * Q @ K^T + pair_bias + res_mask
        P = softmax(S, dim=-1, in float32)
        O = P @ V   (transpose output back to input layout)

    Backward semantics:
        dV          = P^T @ dO
        dP          = dO @ V^T
        dS          = P * (dP - rowsum(dP * P))        # softmax Jacobian, over key-residue axis
        dQ          = scale * dS @ K
        dK          = scale * dS^T @ Q
        d_pair_bias = sum over N_seq of dS              # shape [B, 1, Head, N_res, N_res], float32

    res_mask is additive and carries NO gradient.

    Saved-tensor contract:
    The seed may save only the original inputs. You may modify the EVOLVE-BLOCK so
    forward saves additional tensors (e.g. per-row logsumexp for flash-style P
    recomputation, partial softmax statistics), removes tensors, or changes their order,
    as long as backward consumes the same saved_tensors and correctness is preserved.

    Optimization target:
    - Improve backward_from_saved latency and forward+backward end-to-end latency.
    - You may trade extra saved-tensor memory for faster backward if the latency gain
      justifies it; the evaluator reports saved-tensor bytes.
    - Flash-attention-style backward: stream over KV/Q blocks, recompute P block-by-block
      from a saved per-row logsumexp (LSE), never materialize the full [N_res, N_res]
      probability or score matrix in HBM.
    - Accumulate d_pair_bias with atomic_add in float32; its shape is
      [B, 1, Head, N_res, N_res] after summing over N_seq.
    - Parallelize the program grid over (B * N_seq * Head) and residue blocks.
    - Tune BLOCK_SIZE_Q, BLOCK_SIZE_KV, num_warps, num_stages.
    - Use fp32 accumulation for all reductions and the softmax.
    - Support all correctness shapes: non-power-of-two N_res, small and large Dim,
      both float16 and bfloat16.

    Do not call PyTorch autograd or high-level attention APIs in the generated math.
    Prefer Triton kernels for core forward/backward work.

    Hardware feedback:
    When a candidate becomes the new best, the evaluator profiles it with Nsight Compute.
    If any hardware problems are detected, a "hardware_warnings" artifact appears listing
    the issues. Each warning names a specific bottleneck and the general fix -- take it
    seriously and address it in your next mutation.
    No artifact means the hardware profile is clean.
    Penalized patterns also reduce the combined_score directly, so fixing them improves
    both the score and the hardware health of the kernel.

database:
  population_size: 30
  archive_size: 20
  num_islands: 2
  elite_selection_ratio: 0.25
  exploitation_ratio: 0.75
  similarity_threshold: 0.99

evaluator:
  timeout: 720
  parallel_evaluations: 1
  cascade_evaluation: false

diff_based_evolution: true
max_code_length: 40000
