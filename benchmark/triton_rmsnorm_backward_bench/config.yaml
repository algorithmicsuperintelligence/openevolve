max_iterations: 10
checkpoint_interval: 5
log_level: "INFO"
# CUDA cannot be reinitialized safely in forked subprocesses. On Python 3.10,
# OpenEvolve switches its ProcessPoolExecutor to spawn when this is set.
max_tasks_per_child: 1

llm:
  # Run evolution on GPT-5.5 (OpenAI). Requires OPENAI_API_KEY in the environment.
  primary_model: "gpt-5.5"
  primary_model_weight: 1.0
  api_base: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.5
  max_tokens: 20000
  timeout: 300

prompt:
  system_message: |
    You are an expert Triton GPU programmer implementing and optimizing backward kernels.

    Task:
    Improve the code inside the EVOLVE-BLOCK to make rmsnorm_backward_triton(dy, x, weight, eps)
    faster. This is a forward-to-backward synthesis task. The forward operator is row-wise RMSNorm:

        ms = mean(x^2, axis=-1, keepdim=True)
        rrms = rsqrt(ms + eps)
        xhat = x * rrms
        y = xhat * weight

    where x has shape [rows, hidden] and weight has shape [hidden]. RMSNorm has no
    mean-centering and no bias. The backward kernel must return:

        g = dy * weight
        dx = (g - xhat * mean(g * xhat, axis=-1)) * rrms
        dweight = sum(dy * xhat, dim=0)

    Correctness is a hard requirement. Any incorrect candidate receives a very large negative score.

    Fixed API constraints:
    - Do not change the public function rmsnorm_backward_triton(dy, x, weight, eps).
    - Return exactly a tuple (dx, dweight).
    - Do not change tensor shapes or output semantics.
    - Do not require extra inputs or outputs.
    - Keep support for contiguous 2D CUDA tensors x and dy shaped [rows, hidden].
    - Keep support for the contiguous 1D CUDA tensor weight shaped [hidden].
    - Keep numerically stable fp32 accumulation for reductions.

    Allowed optimization areas:
    - Fusing the naive decomposition kernels.
    - Reusing xhat, rrms, and intermediate reductions.
    - BLOCK_SIZE and BLOCK_ROWS selection.
    - num_warps and num_stages.
    - Load/store masking.
    - Row-wise reductions for mean-square.
    - Column-wise reductions for dweight.

    Generalization requirements:
    - Do not hard-code shape-specific branches or special-case only benchmark shapes.
    - Implementations must work for all tested shapes and dtypes, including non-power-of-two
      hidden sizes and large hidden dimensions.
    - Prefer generic tiling/masking over fixed-shape assumptions.

    The evaluator tests multiple shapes and dtypes, then benchmarks latency only after all
    correctness tests pass. Optimize for speedup over PyTorch autograd backward across the
    full benchmark suite (dynamic and nontile shapes, float32 and float16).

database:
  population_size: 30
  archive_size: 20
  num_islands: 2
  elite_selection_ratio: 0.25
  exploitation_ratio: 0.75
  similarity_threshold: 0.99

evaluator:
  timeout: 300
  parallel_evaluations: 1
  cascade_evaluation: false

diff_based_evolution: true
max_code_length: 30000
