max_iterations: 10
checkpoint_interval: 5
log_level: "INFO"
max_tasks_per_child: 1

llm:
  primary_model: "gpt-4o-mini"
  primary_model_weight: 0.8
  secondary_model: "gpt-4o"
  secondary_model_weight: 0.2
  api_base: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.5
  max_tokens: 20000
  timeout: 180

prompt:
  system_message: |
    You are an expert Triton GPU programmer optimizing a LayerNorm autograd pair.

    Task:
    Improve the code inside the EVOLVE-BLOCK.  The public API is intentionally a
    forward/backward pair with a flexible saved-tensor contract:

        def layernorm_forward_with_saved(x, weight, bias, eps=1e-5):
            return y, saved_tensors

        def layernorm_backward_from_saved(dy, saved_tensors, eps=1e-5):
            return dx, dweight, dbias

    The seed may save only the original inputs.  You may modify the EVOLVE-BLOCK
    so forward saves additional tensors, removes tensors, or changes their order,
    as long as backward consumes the same saved_tensors contract and correctness
    is preserved.

    Forward semantics:
        mean = mean(x, axis=-1, keepdim=True)
        var = mean((x - mean)^2, axis=-1, keepdim=True)
        xhat = (x - mean) / sqrt(var + eps)
        y = xhat * weight + bias

    Backward semantics:
        one = dy * weight
        dx = (one - mean(one) - xhat * mean(xhat * one)) / sqrt(var + eps)
        dweight = sum(dy * xhat, dim=0)
        dbias = sum(dy, dim=0)

    Correctness is a hard requirement.  The evaluator verifies the autograd pair
    against PyTorch autograd and reports saved tensor memory.

    Optimization target:
    - Improve backward_from_saved latency and forward+backward end-to-end latency.
    - You may trade extra saved tensor memory for faster backward if beneficial.
    - Keep support for contiguous 2D CUDA tensors x/dy shaped [rows, hidden].
    - Keep support for contiguous 1D CUDA tensors weight/bias shaped [hidden].
    - Support float32, float16, and bfloat16 benchmark cases.
    - Use fp32 accumulation for reductions.

    Do not call PyTorch autograd or high-level PyTorch LayerNorm in the generated
    math.  Prefer Triton kernels for core forward/backward work.

    Hardware feedback:
    When a candidate becomes the new best, the evaluator profiles it with
    Nsight Compute (ncu) on the largest benchmark shape and attaches the result
    as an "ncu_profile" artifact. Its "patterns" field already classifies the
    diagnosis against Nsight Compute's documented diagnosis playbook -- each
    entry has a "flag" (bool) and an "evidence" string citing the exact metric
    values that triggered it. The same flags are also exposed as metrics
    (ncu_pattern_register_spill, ncu_pattern_small_grid,
    ncu_pattern_latency_bound, ncu_pattern_bandwidth_bound,
    ncu_pattern_occupancy_limited). If this artifact is present, treat it as
    ground truth about *why* the candidate is fast or slow on real hardware --
    prefer it over guessing, and read the "evidence" string rather than just
    the boolean:
    - patterns.register_spill=true: a kernel is spilling registers to local
      memory. This is heavily penalized in the score directly. Reduce live
      variables per kernel, split the kernel, or lower BLOCK_N/num_warps.
    - patterns.latency_bound=true: the kernel is latency-bound on memory
      (long_scoreboard stalls dominate, DRAM bandwidth is not the bottleneck)
      -- look for redundant reloads of saved tensors or insufficient
      instruction-level parallelism, not "reduce bytes read."
    - patterns.bandwidth_bound=true: DRAM bandwidth genuinely is the
      bottleneck -- reducing saved-tensor bytes or downcasting a saved
      tensor's dtype is the right lever here, unlike the latency-bound case.
    - patterns.small_grid=true: too few thread blocks to fill the GPU --
      split a reduction across more program ids or fuse with an adjacent
      kernel rather than trying to make the single block faster.
    - patterns.occupancy_limited=true: achieved occupancy is far below
      theoretical occupancy -- check whether stalls (see latency_bound) or
      load imbalance is the cause before assuming it's a launch-config issue.
    - The "top_rule_suggestion" field inside the ncu_profile artifact is
      Nsight Compute's own rule-engine output (with an estimated speedup
      percentage) -- read it first; it is usually directly actionable.

database:
  population_size: 30
  archive_size: 20
  num_islands: 2
  elite_selection_ratio: 0.25
  exploitation_ratio: 0.75
  similarity_threshold: 0.99

evaluator:
  timeout: 420
  parallel_evaluations: 1
  cascade_evaluation: false

diff_based_evolution: true
max_code_length: 30000
